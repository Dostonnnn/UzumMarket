<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./styles/general.css" />
    <link rel="stylesheet" href="./styles/main.css" />
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-up">
        <h2 class="logo">Uzum Market</h2>
        <form action="" class="navbar-up-form">
          <input
            type="text"
            placeholder="Search"
            name="search"
            class="navbar-up-form-input"
          />
        </form>
        <span class="red count">0</span>

        <button class="navbar-up-login">Login</button>
      </div>
    </nav>
    <div class="navbar-down">
      <button class="navbar-down-electronic btn">Electronic</button>
      <button class="navbar-down-men btn">Men's</button>
      <button class="navbar-down-women btn">Women's</button>
      <button class="navbar-down-jewelery btn">Jewelry</button>
      <button class="navbar-down-refresh btn">Refresh</button>
    </div>
    <div class="main">
      <img src="./images/uzum-main-img.png" alt="main-img" class="main-img" />
      <div class="main-cards"></div>
    </div>

    <div class="view hidden">
      <div class="modal-overlay"></div>
    </div>
    <div class="basket-modal hidden">
      <div class="basket-overlay">
        <div class="basket-card">
          <button onclick="closeBasket()" class="basket-close">✕</button>

          <img src="" alt="" class="basket-img" />

          <h3 class="basket-title"></h3>

          <p class="basket-price"></p>

          <div class="basket-counter">
            <button onclick="decreaseCount()" class="basket-minus">-</button>
            <span class="basket-quantity">1</span>
            <button onclick="increaseCount()" class="basket-plus">+</button>
          </div>

          <div class="basket-actions">
            <button onclick="closeBasket()" class="basket-cancel">
              Cancel
            </button>

            <button onclick="checkoutProduct()" class="basket-checkout">
              Checkout
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="./js/main.js"></script>
  </body>
</html>
