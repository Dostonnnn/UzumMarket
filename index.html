<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="./styles/general.css" />
    <link rel="stylesheet" href="./styles/main.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.css"
    />
  </head>
  <body>
    <nav class="navbar">
      <div class="navbar-up">
        <div class="logo">
          <img class="logo-img" src="./images/Link → SVG.png" alt="" />
        </div>
        <span class="navbar-up-catalog"><p class="catalog">Catalog</p></span>
        <form action="" class="navbar-up-form">
          <input
            type="text"
            placeholder="Mahsulotlar va turkumlar izlash"
            name="search"
            class="navbar-up-form-input"
          />
        </form>
        <button class="navbar-up-login">
          <img class="login-img" src="./images/SVG.png" alt="" />Kirish
        </button>
        <button class="navbar-up-login">
          <img class="login-img" src="./images/Frame.png" alt="" />Saralangan
        </button>
        <button class="navbar-up-login">
          <img class="login-img" src="./images/basket.png" alt="" />Savat
        </button>
      </div>
      <div class="navbar-down">
        <ul class="navbar-down-list">
          <li class="navbar-down-electronic">Elektronika</li>
          <li class="navbar-down-women">Erkaklar</li>
          <li class="navbar-down-women">Ayollar</li>
          <li class="navbar-down-jewelery">Zargarlik</li>
          <li class="navbar-down-electronic">Elektronika</li>
          <li class="navbar-down-women">Erkaklar</li>
          <li class="navbar-down-women">Ayollar</li>
          <li class="navbar-down-jewelery">Zargarlik</li>
          <li class="navbar-down-electronic">Elektronika</li>
          <li class="navbar-down-women">Erkaklar</li>
          <li class="navbar-down-women">Ayollar</li>
          <li class="navbar-down-jewelery">Zargarlik</li>
        </ul>
      </div>
    </nav>

    <div class="main">
      <div class="swiper">
        <!-- Additional required wrapper -->
        <div class="swiper-wrapper">
          <!-- Slides -->
          <div class="swiper-slide">
            <img src="./images/uzum-main-img.png" alt="" />
          </div>
          <div class="swiper-slide">
            <img src="./images/mens3.png" alt="" />
          </div>
          <div class="swiper-slide">
            <img src="./images/womens2.png" alt="" />
          </div>

          ...
        </div>
        <!-- If we need pagination -->
        <div class="swiper-pagination"></div>

        <!-- If we need navigation buttons -->
        <div class="swiper-button-prev"></div>
        <div class="swiper-button-next"></div>

        <!-- If we need scrollbar -->
        <div class="swiper-scrollbar"></div>
      </div>
      <div class="main-cards"></div>
    </div>

    <div class="view hidden">
      <div class="modal-overlay"></div>
    </div>
    <div class="basket-modal hidden">
      <div class="basket-overlay">
        <div class="basket-card">
          <button onclick="closeBasket()" class="basket-close">✕</button>

          <img src="" alt="" class="basket-img" />

          <h3 class="basket-title"></h3>

          <p class="basket-price"></p>

          <div class="basket-counter">
            <button onclick="decreaseCount()" class="basket-minus">-</button>
            <span class="basket-quantity">1</span>
            <button onclick="increaseCount()" class="basket-plus">+</button>
          </div>

          <div class="basket-actions">
            <button onclick="closeBasket()" class="basket-cancel">
              Cancel
            </button>

            <button onclick="checkoutProduct()" class="basket-checkout">
              Checkout
            </button>
          </div>
        </div>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/swiper@12/swiper-bundle.min.js"></script>

    <script src="./js/main.js"></script>
  </body>
</html>
